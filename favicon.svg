<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="CapStack">
  <rect width="32" height="32" rx="7" fill="#17694F"/>
  <!-- frame caps -->
  <rect x="9.3" y="6.3" width="13.4" height="2.4" rx="1.2" fill="#EDF0EC"/>
  <rect x="9.3" y="23.3" width="13.4" height="2.4" rx="1.2" fill="#EDF0EC"/>
  <!-- glass: two triangles that meet at a single neck point (16,16) -->
  <path d="M11 9 L21 9 L16 16 L21 23 L11 23 L16 16 Z"
        fill="none" stroke="#EDF0EC" stroke-width="1.8" stroke-linejoin="round"/>
  <!-- sand flowing through: remaining up top, stream through the neck, pile at the bottom -->
  <path d="M12.3 9.9 L19.7 9.9 L16 13.5 Z" fill="#E0932A"/>
  <line x1="16" y1="13.2" x2="16" y2="18.8" stroke="#E0932A" stroke-width="1.6" stroke-linecap="round"/>
  <path d="M12.7 22.1 L19.3 22.1 L16 18.5 Z" fill="#E0932A"/>
</svg>
